<!DOCTYPE html>
<html>
<head>
<title>East Gate International Hotel</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2c5364;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1b3947;
}

</style>

</head>

<body>

<div class="login-box">

<h2>East Gate International Hotel</h2>

<input type="text" placeholder="Email or Phone Number">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){
    window.location.href="dashboard/admin.html";
}
</script>

</body>
</html>
