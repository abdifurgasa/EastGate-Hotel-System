<!DOCTYPE html>
<html>
<head>
<title>Add Room - East Gate Hotel</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0f2027;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#2c5364;
}

</style>

</head>

<body>

<div class="container">

<h2>🏨 Add Hotel Room</h2>

<input type="text" placeholder="Room Number">

<select>
<option>Single Room</option>
<option>Double Room</option>
<option>VIP Room</option>
<option>Suite Room</option>
</select>

<input type="text" placeholder="Price Per Night">

<input type="file">

<button>Add Room</button>

</div>

</body>
</html>
