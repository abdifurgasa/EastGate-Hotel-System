<!DOCTYPE html>
<html>
<head>
<title>New Booking - East Gate Hotel</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0f2027;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#2c5364;
}

</style>

</head>

<body>

<div class="container">

<h2>📅 New Booking</h2>

<input type="text" placeholder="Guest Name">

<input type="text" placeholder="Phone Number">

<select>
<option>Select Room Type</option>
<option>Single Room</option>
<option>Double Room</option>
<option>VIP Room</option>
<option>Suite Room</option>
</select>

<input type="date">

<button>Confirm Booking</button>

</div>

</body>
</html>
