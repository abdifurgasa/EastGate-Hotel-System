<!DOCTYPE html>
<html>
<head>
<title>New Booking</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body style="font-family:Arial;padding:20px;background:#f4f6f9">

<h2>➕ New Booking</h2>

<input id="room" placeholder="Room Name" style="width:100%;padding:10px;margin:8px 0">

<input id="customer" placeholder="Customer Name" style="width:100%;padding:10px;margin:8px 0">

<input id="amount" placeholder="Amount" style="width:100%;padding:10px;margin:8px 0">

<button onclick="saveBooking()" style="padding:12px;width:100%;background:purple;color:white;border:none">
Save Booking
</button>

<script>

function saveBooking(){

let room=document.getElementById("room").value;
let customer=document.getElementById("customer").value;
let amount=document.getElementById("amount").value;

if(!room || !customer || !amount){
alert("Fill all fields");
return;
}

let today=new Date().toLocaleDateString();

let data=localStorage.getItem("hotelMaster");

let system=data?JSON.parse(data):{bookings:[]};

system.bookings.push({
room,
customer,
amount,
date:today
});

localStorage.setItem("hotelMaster",JSON.stringify(system));

alert("Booking Saved");
location.href="booking-list.html";
}

</script>

</body>
</html>
